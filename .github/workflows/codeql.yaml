name: CodeQL Security Analysis

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp', 'python']
        include:
          - language: cpp
            build-mode: manual
          - language: python
            build-mode: none

    steps:
      - name: Checkout Repository 📥
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Initialize CodeQL 🛡️
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - 'deps/**'
              - 'test/cmocka/**'
            paths:
              - 'libobs'
              - 'frontend'
              - 'plugins/obs-ffmpeg'
              - 'plugins/obs-outputs'
              - 'plugins/obs-filters'

      # C++ requires compilation for accurate analysis
      - name: Setup Build Environment (C++) 🔧
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            extra-cmake-modules \
            pkg-config \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-composite0-dev \
            libxcb1-dev \
            libxcb-xinput-dev \
            libxcomposite-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-dev \
            libpulse-dev \
            libasound2-dev \
            libjack-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libluajit-5.1-dev \
            libpci-dev \
            libpipewire-0.3-dev \
            librist-dev \
            libsrt-openssl-dev \
            libspeexdsp-dev \
            libudev-dev \
            libv4l-dev \
            libvlc-dev \
            libwayland-dev \
            libx264-dev \
            libdrm-dev \
            libglib2.0-dev \
            libva-dev \
            libsimde-dev \
            uthash-dev \
            libjansson-dev

      - name: Build Project (C++) 🏗️
        if: matrix.language == 'cpp'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_UI=OFF \
            -DENABLE_FRONTEND=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DBUILD_TESTING=OFF \
            -DENABLE_AJA=OFF \
            -DENABLE_DECKLINK=OFF \
            -DENABLE_NVENC=OFF \
            -DENABLE_QSV11=OFF \
            -DENABLE_VST=OFF \
            -DENABLE_WEBRTC=OFF
          cmake --build build --parallel $(nproc)

      - name: Perform CodeQL Analysis 🔍
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout Repository 📥
        uses: actions/checkout@v6

      - name: Dependency Review 📦
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, GPL-2.0, GPL-3.0, LGPL-2.1, LGPL-3.0, ISC, Zlib

  security-summary:
    name: Security Summary
    needs: [analyze, dependency-review]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary 📊
        run: |
          echo "## Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Analysis | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL (C++) | ${{ needs.analyze.result == 'success' && '✅ Completed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL (Python) | ${{ needs.analyze.result == 'success' && '✅ Completed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result == 'success' && '✅ Passed' || '⚠️ Skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results in the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY